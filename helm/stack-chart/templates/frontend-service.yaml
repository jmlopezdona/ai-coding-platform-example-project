{{/*
  Frontend ClusterIP Service
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stack-chart.fullname" . }}-frontend
  labels:
    {{- include "stack-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "stack-chart.componentLabels" (dict "component" "frontend" "root" .) | nindent 4 }}
