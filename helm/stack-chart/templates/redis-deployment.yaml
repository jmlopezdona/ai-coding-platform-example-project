{{/*
  Redis Deployment — conditional on .Values.redis.enabled
  In-memory cache. No persistence — starts with a clean state.
*/}}
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stack-chart.fullname" . }}-redis
  labels:
    {{- include "stack-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stack-chart.componentLabels" (dict "component" "redis" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stack-chart.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      {{- with .Values.scheduling.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp-redis
              containerPort: {{ .Values.redis.port }}
              protocol: TCP
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
{{- end }}
