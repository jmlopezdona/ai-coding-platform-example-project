# =============================================================================
# Skaffold Configuration — Application stack deployment
# =============================================================================
# Executed by the platform's Skaffold sidecar inside the dev pod.
# The sidecar renders $VAR placeholders with sed before running skaffold dev.
#
# Platform-provided env vars:
#   $DC_ID                  — Delivery Cycle identifier
#   $DC_BRANCH              — Git branch
#   $SKAFFOLD_DEFAULT_REPO  — ECR registry prefix
#   $SKAFFOLD_NAMESPACE     — Target K8s namespace (env-{dc-id})
# =============================================================================
apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: agent-dev-env

build:
  cluster:
    namespace: $SKAFFOLD_NAMESPACE
    serviceAccount: dev-pod-runner
    tolerations:
      - key: "spot"
        value: "true"
        effect: "NoSchedule"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
  tagPolicy:
    sha256: {}
  artifacts:
    - image: backend
      context: apps/backend
      kaniko:
        dockerfile: Dockerfile
        env:
          - name: AWS_SDK_LOAD_CONFIG
            value: "true"
      sync:
        manual:
          - src: "src/**/*.js"
            dest: /app

    - image: frontend
      context: apps/frontend
      kaniko:
        dockerfile: Dockerfile
        env:
          - name: AWS_SDK_LOAD_CONFIG
            value: "true"
      sync:
        manual:
          - src: "src/**"
            dest: /usr/share/nginx/html
            strip: "src/"
          - src: "nginx.conf"
            dest: /etc/nginx/conf.d/default.conf

deploy:
  # Skaffold's defaults (statusCheck + helm wait, both with a 5 min timeout)
  # uninstall the release on a slow first init and corrupt PVCs. See
  # ONBOARDING.md §2.3.1. Trust the chart's readiness/liveness probes instead.
  statusCheck: false
  helm:
    releases:
      - name: stack-$DC_ID
        chartPath: helm/stack-chart
        namespace: $SKAFFOLD_NAMESPACE
        wait: false
        setValues:
          global.branch: $DC_BRANCH
          global.envId: $DC_ID
          global.registry: $SKAFFOLD_DEFAULT_REPO
          postgres.createStorageClass: "false"
        setValueTemplates:
          backend.image: "{{.IMAGE_FULLY_QUALIFIED_backend}}"
          frontend.image: "{{.IMAGE_FULLY_QUALIFIED_frontend}}"
