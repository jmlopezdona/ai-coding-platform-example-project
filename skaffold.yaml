# =============================================================================
# Skaffold Configuration — Application stack deployment
# =============================================================================
# In-cluster (from skaffold-sync pod):
#   skaffold dev --filename=/config/skaffold.yaml --namespace=env-{dc-id}
#
# Local development:
#   skaffold dev
# =============================================================================
apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: agent-dev-env

build:
  local:
    useDockerCLI: true
    push: true
  tagPolicy:
    gitCommit: {}
  artifacts:
    - image: registry.internal/backend
      context: apps/backend
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: "src/**/*.js"
            dest: /app/src

    - image: registry.internal/frontend
      context: apps/frontend
      docker:
        dockerfile: Dockerfile
      sync:
        manual:
          - src: "src/**"
            dest: /usr/share/nginx/html
          - src: "nginx.conf"
            dest: /etc/nginx/conf.d/default.conf

deploy:
  helm:
    releases:
      - name: app-stack
        chartPath: helm/stack-chart
        setValues:
          global.registry: registry.internal

portForward:
  - resourceType: service
    resourceName: backend
    port: 8080
    localPort: 8080
  - resourceType: service
    resourceName: frontend
    port: 3000
    localPort: 3000
